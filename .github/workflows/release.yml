# =============================================================
# 苏超直播中台 - 自动构建并发布镜像
# 触发条件：推送 v* 格式的 git tag（如 v1.2.0）
# 产出：ghcr.io 上的 backend + frontend 镜像 + GitHub Release
# =============================================================

name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/live-broadcast-hub

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: write      # 创建 GitHub Release
      packages: write      # 推送镜像到 GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag version
        id: meta
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      # ---- Backend ----
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/backend:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- Frontend ----
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/frontend:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- GitHub Release ----
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "苏超直播中台 ${{ steps.meta.outputs.version }}"
          body: |
            ## 安装方式

            在目标 Linux 服务器上执行：

            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
            ```

            ## 手动安装（可选）

            1. 下载 `docker-compose.prod.yml` 和 `.env.example`
            2. 复制 `.env.example` 为 `.env` 并填写配置
            3. 执行 `docker compose -f docker-compose.prod.yml up -d`

            ## 镜像地址

            - `${{ env.IMAGE_PREFIX }}/backend:${{ steps.meta.outputs.version }}`
            - `${{ env.IMAGE_PREFIX }}/frontend:${{ steps.meta.outputs.version }}`
          files: |
            docker-compose.prod.yml
            .env.example
            install.sh
