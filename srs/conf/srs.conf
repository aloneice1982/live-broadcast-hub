# =============================================================
# SRS 4/5 配置 — 苏超联赛直播分发中台
#
# 流路径命名规则：
#   每个地市一个独立 stream key，格式 live/{city_code}
#   例：live/tz (泰州), live/nj (南京), live/sz (苏州) ...
#
# 切流机制：
#   SRS 允许同一 stream key 被覆盖发布（新 publish 断开旧连接）
#   这是"无缝切流"的核心：
#     inject 新进程推流 → SRS 断开旧进程 → push 进程 reconnect
# =============================================================

listen              1935;
max_connections     1000;
srs_log_tank        console;
srs_log_level       warn;
daemon              off;     # Docker 容器内不能后台化

# ── HTTP API（后端 srsapi 包调用）─────────────────────────────
# 用于：流状态查询、无缝切流确认（WaitUntilPublishing）
http_api {
    enabled         on;
    listen          1985;
    # 只监听内网（安全）
    crossdomain     on;
}

# ── HTTP Server（可选调试：HLS / HTTP-FLV）────────────────────
http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

# ── 统计模块（提供 /api/v1/streams 所需数据）─────────────────
stats {
    network         0;
    disk            none;
}

# ── 默认 RTMP 虚拟主机 ────────────────────────────────────────
vhost __defaultVhost__ {

    # ── 发布端配置（inject-ffmpeg 推流）──────────────────────
    publish {
        # 允许同一 stream key 被新连接覆盖发布
        # 这是无缝切流的关键：新 inject 进程连上后，
        # SRS 自动断开旧 inject 进程，push 端几乎无感
        normal_timeout  10000;  # 发布者超时 10s
    }

    # ── 播放端配置（push-ffmpeg 拉流）────────────────────────
    play {
        # GOP 缓存：新播放者连接时立刻收到最近的完整 GOP
        # 对 push-ffmpeg 而言：切流窗口内 SRS 用缓存数据填充，
        # 避免 push 端看到空流导致连接断开
        gop_cache       on;

        # GOP 缓存队列长度（秒）
        # 设为 10s：足够覆盖切流时的短暂间隙（通常 < 3s）
        queue_length    10;

        # 最小延迟模式关闭（保留缓冲，优先稳定性）
        # 直播分发场景要稳定不要超低延迟
        atc             off;
    }

    # ── HTTP-FLV（可选：用于前端嵌入播放器监控画面）──────────
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }

    # ── HLS（可选：录制存档 / 备用分发）──────────────────────
    # 默认关闭，避免占用磁盘
    # hls {
    #     enabled     on;
    #     hls_path    ./objs/nginx/html;
    #     hls_fragment 2;    # 2s 切片，与 GOP 对齐
    #     hls_window  20;    # 保留最近 20s（10 个切片）
    # }

    # ── HTTP 回调（通知后端流状态变化）──────────────────────
    # 后端用于更新 DB 中 ffmpeg_processes 表的状态
    http_hooks {
        enabled         on;
        on_publish      http://backend:8080/hooks/srs/publish;
        on_unpublish    http://backend:8080/hooks/srs/unpublish;
        # SRS 要求回调返回 {"code": 0} 否则拒绝连接
        # 如果回调失败，SRS 仍允许推流（不影响主业务）
    }
}
